# CI checks for apps/web and apps/admin. Deploys are handled by Vercel's native GitHub integration.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck, lint, build
    runs-on: ubuntu-latest
    env:
      # apps/admin build-time placeholders — no real secrets in CI. Real values
      # are set as Vercel project env vars for the deployed app.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      ZOHO_CLIENT_ID: placeholder
      ZOHO_CLIENT_SECRET: placeholder
      ZOHO_REFRESH_TOKEN: placeholder
      ZOHO_ACCOUNTS_DOMAIN: https://accounts.zoho.com
      ZOHO_API_DOMAIN: https://sign.zoho.com
      ZOHO_WEBHOOK_SECRET: placeholder
      APP_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck:all

      - name: Lint
        run: npm run lint:all

      - name: Build
        run: npm run build:all
